<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title th:text="${title}">Base Page</title>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/CSS/style.css}">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container-fluid">

        <a class="navbar-brand" href="#">
            Smart Contact Manager
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarSupportedContent">

            <ul class="navbar-nav ms-auto text-uppercase">

                <li class="nav-item">
                    <a class="nav-link active"
                       th:href="@{/}">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <span th:text="${user.name}"></span>
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/logout}">
                        Logout
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- Sidebar -->

<div class="sidebar">

    <span class="crossbtn" onclick="toggleSidebar()">
    &#10005;
</span>

    <a href="" class="item">
        <i class="fa-solid fa-house"></i> Home
    </a>

    <a href="" class="item">
        <i class="fa-solid fa-address-book"></i> View Contact
    </a>

    <a href="" class="item">
        <i class="fa-solid fa-user-plus"></i> Add Contact
    </a>

    <a href="" class="item">
        <i class="fa-solid fa-users"></i> Your Contact
    </a>

    <a href="" class="item">
        <i class="fa-solid fa-gear"></i> Setting
    </a>

    <a href="" class="item">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
    </a>

    <div class="divider"></div>

</div>

<!-- Main Content -->

<div class="content">

    <i onclick="toggleSidebar()"
       class="fas fa-bars mt-3 m-3"
       style="cursor:pointer;font-size:25px;"></i>

    <div th:replace="${content}"></div>

</div>

<!-- jQuery -->

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->

<script th:src="@{/JS/script.js}"></script>

</body>
</html>
