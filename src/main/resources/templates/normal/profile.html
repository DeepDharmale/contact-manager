<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="normal/base :: layout(~{::section})">

<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
</head>

<body>

<section>

    <div class="container mt-4">

        <div class="card shadow">
            <div class="card-body text-center">

                <!-- User Image -->
                <img th:src="@{'/img/' + ${user.imageUrl}}"
                     alt="User Image"
                     class="rounded-circle shadow mb-3"
                     style="width: 150px; height: 150px; object-fit: cover;">

                <!-- User Name -->
                <h3 class="fw-bold mb-1" th:text="${user.name}">
                    User Name
                </h3>

                <!-- Role -->
                <p class="text-muted mb-3" th:text="${user.role}">
                    ROLE_USER
                </p>

                <hr>

                <!-- User Information -->
                <div class="text-start">

                    <p>
                        <i class="fa fa-envelope text-primary me-2"></i>
                        <strong>Email:</strong>
                        <span th:text="${user.email}">
                            user@example.com
                        </span>
                    </p>

                    <p>
                        <i class="fa fa-user-check text-success me-2"></i>
                        <strong>Status:</strong>
                        <span th:text="${user.enabled ? 'Active' : 'Inactive'}">
                            Active
                        </span>
                    </p>

                    <p>
                        <i class="fa fa-info-circle text-warning me-2"></i>
                        <strong>About:</strong>
                        <span th:text="${user.about}">
                            About User
                        </span>
                    </p>

                </div>

            </div>
        </div>

    </div>

</section>

</body>
</html>
