<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
<link rel="stylesheet" th:href="@{/CSS/style.css}">
    <title th:text="${title}">Base Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
</head>

<body>


    <!-- Navbar -->

   <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">

    <a class="navbar-brand" href="#">Smart Contact Manager</a>

    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">

      <ul class="navbar-nav ms-auto text-uppercase">

        <li class="nav-item">
          <a class="nav-link active" th:href="@{/}"  href="#">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" th:href="@{/about}"  href="#">About</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" th:href="@{/signin}">Login</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" th:href="@{/signup}" href="#">Signup</a>
        </li>

      </ul>

    </div>
  </div>
</nav>
<!-- END navbar -->



    
        <div th:replace="${content}"></div>


    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous">
    </script>

	<script th:src="@{/JS/script.js}"></script>
</body>
</html>
