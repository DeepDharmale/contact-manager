<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="base::layout(~{::section})">

<head>
    <meta charset="UTF-8">
    <title>This is signup page</title>
</head>

<body>

<section>

    <div class="container">
        <div class="row">

            <div class="col-md-8 offset-md-2">

					<div class="my-card p-4">
					
					    <!-- message -->
					
					    <div th:if="${session.message}"
					         th:classappend="${session.message.type}"
					         class="alert"
					         role="alert">
					
					        <p th:text="${session.message.content}"></p>
					        
					
					    </div>
					
					    <!-- image -->
					
					    <div class="container text-center">
					        <img style="width:80px;"
					             th:src="@{/img/membership.png}"
					             alt="membership image" />
					    </div>

                    <h1 class="text-center mt-3">Sign Up</h1>

                    <!-- form -->

                    <form novalidate th:action="@{/do_register}"
                          method="post"
                          th:object="${user}">

                        <!-- name field -->

                        <div class="mb-3">

                            <label class="form-label">Your Name</label>

                            <input type="text"
                                   name="name"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                                   id="name_field"
                                   placeholder="Enter your name"
                                   required
                                   th:value="${user.name}"/>
                                   
                                   <div class="invalid-feedback" th:each="e :${#fields.errors('name')}" th:text="${e}"></div>
                        </div>
                        

                        <!-- email field -->

                        <div class="mb-3">

                            <label class="form-label">Email address</label>

                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   id="email_field"
                                   placeholder="Enter your email"
                                   required
                                   th:value="${user.email}">
                        </div>

                        <!-- password field -->

                        <div class="mb-3">

                            <label class="form-label">Password</label>

                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   id="password_field"
                                   placeholder="Enter your password"
                                   required>
                        </div>

                        <!-- about field -->

                        <div class="mb-3">

                            <textarea name="about"
                                      rows="7"
                                      class="form-control"
                                      placeholder="Enter something about yourself"
                                      th:text="${user.about}"></textarea>

                        </div>

                        <!-- agreement -->

                        <div class="form-check mb-3">

                            <input type="checkbox"
                                   name="agreement"
                                   class="form-check-input"
                                   id="agreement">

                            <label for="agreement">
                                Accept terms and conditions
                            </label>

                        </div>

                        <!-- buttons -->

                        <div class="container text-center">

                            <button type="submit"
                                    class="btn btn-primary">
                                Submit
                            </button>

                            <button type="reset"
                                    class="btn btn-warning">
                                Reset
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>

</section>

</body>
</html>
